<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <a class="h1"><b>Stracon</b></a>
    </div>

    <div class="card-body">
      <p class="login-box-msg" *ngIf="!isRecovering">Inicia sesión para continuar</p>
      <p class="login-box-msg" *ngIf="isRecovering">Recuperar acceso</p>

      <ng-container *ngIf="!isLoading; else loadingTemplate">
        <!-- LOGIN FORM -->
        <form *ngIf="!isRecovering" [formGroup]="loginForm" (ngSubmit)="login()">
          <!-- Email -->
          <div class="input-group mb-3">
            <input type="email" class="form-control" placeholder="Email" formControlName="email" />
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-envelope"></span>
              </div>
            </div>
          </div>

          <!-- Password -->
          <div class="input-group mb-3">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              placeholder="Password"
              formControlName="password"
            />
            <div class="input-group-append">
              <button
                type="button"
                class="btn btn-outline-secondary"
                (click)="showPassword = !showPassword"
                [attr.aria-pressed]="showPassword"
                title="Mostrar u ocultar contraseña"
              >
                <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
          </div>

          <!-- Remember + Forgot -->
          <div class="row mb-3">
            <div class="col-7">
              <div class="icheck-primary">
                <input type="checkbox" id="remember" formControlName="remember" />
                <label for="remember"> Recordarme </label>
              </div>
            </div>
            <div class="col-5 text-right">
              <a (click)="showRecoverForm()" class="cursor-pointer">¿Olvidaste?</a>
            </div>
          </div>

          <!-- Submit -->
          <div class="row">
            <div class="col-12">
              <button
                type="submit"
                class="btn btn-primary btn-block"
                [disabled]="loginForm.invalid || isLoading"
              >
                Iniciar sesión
              </button>
            </div>
          </div>
        </form>

        <!-- REGISTER LINK -->
        <!-- <p class="mb-1 mt-3 text-center" *ngIf="!isRecovering">
          ¿Aún no tienes cuenta?
          <a (click)="goToRegister()" class="cursor-pointer">Regístrate</a>
        </p> -->

        <!-- RECOVER FORM -->
        <form *ngIf="isRecovering" [formGroup]="recoverForm" (ngSubmit)="requestAccessCode()">
          <div class="input-group mb-3">
            <input type="email" class="form-control" placeholder="Email" formControlName="email" />
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-envelope"></span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Solicitar código de acceso
          </button>

          <p class="mt-3 mb-0 text-center">
            ¿Recordaste tu contraseña?
            <a (click)="showLoginForm()" class="cursor-pointer">Iniciar sesión</a>
          </p>
        </form>
      </ng-container>

      <ng-template #loadingTemplate>
        <div class="text-center py-3">
          <i class="fas fa-spinner fa-spin fa-2x"></i>
          <p class="mt-2 mb-0">Cargando...</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
