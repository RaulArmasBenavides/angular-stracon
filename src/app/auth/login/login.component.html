<section class="min-h-screen grid grid-cols-1 md:grid-cols-2 bg-white">
	<app-tuvihero
		badgeText="LOCALES"
		title="LOCALES A SOLO UN"
		subtitle="CLICK DE DISTANCIA."
		ctaText="¿QUÉ ESTAS BUSCANDO HOY?"
		ctaIcon="search"
	></app-tuvihero>
	<div class="flex items-center justify-center p-8 bg-white">
		<div class="w-full max-w-md">
			<ng-container *ngIf="!isLoading; else loadingTemplate">
				<form *ngIf="!isRecovering" [formGroup]="loginForm" (ngSubmit)="login()" id="loginform">
					<div class="flex justify-center mb-6">
						<img src="../assets/images/logo-icon.png" alt="Logo" class="w-24 h-24" />
					</div>

					<div class="mb-4">
						<label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
						<input
							type="email"
							formControlName="email"
							placeholder="Email"
							class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
						/>
					</div>

					<div class="mb-4 relative">
						<label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>

						<!-- ⬇️ Enlaza el tipo y agrega espacio a la derecha -->
						<input
							[type]="showPassword ? 'text' : 'password'"
							formControlName="password"
							placeholder="Password"
							class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
						/>

						<button
							type="button"
							(click)="showPassword = !showPassword"
							class="absolute right-3 top-9 text-gray-500 z-10"
							aria-label="Mostrar u ocultar contraseña"
							title="Mostrar u ocultar contraseña"
							[attr.aria-pressed]="showPassword"
						>
							<!-- Ojo cerrado -->
							<svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
								/>
							</svg>

							<!-- Ojo abierto -->
							<svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.548-4.042M9.88 9.88a3 3 0 104.24 4.24M6.1 6.1l11.8 11.8"
								/>
							</svg>
						</button>
					</div>

					<div class="flex justify-between items-center text-sm mb-4">
						<label class="inline-flex items-center">
							<input type="checkbox" formControlName="remember" class="rounded text-green-600 border-gray-300 focus:ring-green-500" />
							<span class="ml-2 text-gray-600">Recordarme</span>
						</label>
						<a (click)="showRecoverForm()" class="text-green-600 hover:underline cursor-pointer"> ¿Olvidaste tu contraseña? </a>
					</div>
					<button
						type="submit"
						class="w-full bg-accent hover:bg-green-700 text-black font-semibold py-2 rounded-md mb-4"
						[disabled]="loginForm.invalid || isLoading"
					>
						Iniciar Sesión
					</button>
				</form>

				<div *ngIf="!isRecovering" class="text-center text-sm text-gray-600">
					¿Aún no tienes cuenta?
					<button type="button" (click)="goToRegister()" class="text-green-600 font-medium hover:underline">Regístrate</button>
				</div>
				<form *ngIf="isRecovering" [formGroup]="recoverForm" (ngSubmit)="requestAccessCode()">
					<div class="flex justify-center mb-6">
						<img src="../assets/images/logo-icon.png" alt="Logo" class="w-24 h-24" />
					</div>

					<!-- Email para recuperar -->
					<div class="mb-4">
						<label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
						<input
							type="email"
							formControlName="email"
							placeholder="Email"
							class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
						/>
					</div>

					<button type="submit" class="w-full bg-accent hover:bg-green-700 text-black font-semibold py-2 rounded-md mb-4">
						Solicitar código de acceso
					</button>

					<div class="text-center text-sm text-gray-600">
						¿Recordaste tu contraseña?
						<a (click)="showLoginForm()" class="text-accent font-medium hover:underline cursor-pointer">Iniciar sesión</a>
					</div>
				</form>
			</ng-container>
			<ng-template #loadingTemplate>
				<app-loader></app-loader>
			</ng-template>
		</div>
	</div>
</section>
