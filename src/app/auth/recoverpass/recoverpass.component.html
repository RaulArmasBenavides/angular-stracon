<section class="min-h-screen grid grid-cols-1 md:grid-cols-2 bg-white">
	<app-tuvihero
		badgeText="LOCALES"
		title="LOCALES A SOLO UN"
		subtitle="CLICK DE DISTANCIA."
		ctaText="¿QUÉ ESTAS BUSCANDO HOY?"
		ctaIcon="search"
	></app-tuvihero>
	<div class="flex items-center justify-center p-8 bg-white">
		<div class="w-full max-w-md">
			<form [formGroup]="_formPassword" (ngSubmit)="resetPassword()">
				<div class="flex justify-center mb-6">
					<img src="../assets/images/logo-icon.png" alt="Logo" class="w-24 h-24" />
				</div>

				<div class="mb-4">
					<label class="block text-sm font-medium text-gray-700 mb-1">Código de recuperación</label>
					<input
						type="text"
						formControlName="accessCode"
						placeholder="Código de recuperación"
						class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
					/>
					<div *ngIf="_formPassword.get('accessCode')?.invalid && _formPassword.get('accessCode')?.touched" class="text-red-500 text-sm mt-1">
						El código de recuperación es requerido
					</div>
				</div>

				<!-- Campo Password con ojito -->
				<div class="mb-4 relative">
					<label class="block text-sm font-medium text-gray-700 mb-1">Nuevo Password</label>
					<input
						[type]="showPassword ? 'text' : 'password'"
						formControlName="password"
						placeholder="Nuevo Password"
						class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
					/>
					<button
						type="button"
						(click)="toggleShowPassword()"
						aria-label="Mostrar u ocultar contraseña"
						class="absolute right-3 top-9 text-gray-600 focus:outline-none"
					>
						<svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
							/>
						</svg>
						<svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.004-3.356M15 12a3 3 0 01-3 3m0-6a3 3 0 013 3m4.243 4.243L19 19m0 0l-3.758-3.758m3.758 3.758L15 15m4 4l-4-4"
							/>
						</svg>
					</button>
					<div *ngIf="_formPassword.get('password')?.invalid && _formPassword.get('password')?.touched" class="text-red-500 text-sm mt-1">
						La contraseña es requerida y debe tener al menos 6 caracteres
					</div>
				</div>

				<!-- Campo Confirmar Password con ojito -->
				<div class="mb-4 relative">
					<label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Password</label>
					<input
						[type]="showConfirmPassword ? 'text' : 'password'"
						formControlName="c_password"
						placeholder="Confirmar Password"
						class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
					/>
					<button
						type="button"
						aria-label="Mostrar u ocultar contraseña"
						(click)="toggleShowConfirmPassword()"
						class="absolute right-3 top-9 text-gray-600 focus:outline-none"
					>
						<svg
							*ngIf="!showConfirmPassword"
							xmlns="http://www.w3.org/2000/svg"
							class="h-5 w-5"
							fill="none"
							viewBox="0 0 24 24"
							stroke="currentColor"
						>
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
							/>
						</svg>
						<svg
							*ngIf="showConfirmPassword"
							xmlns="http://www.w3.org/2000/svg"
							class="h-5 w-5"
							fill="none"
							viewBox="0 0 24 24"
							stroke="currentColor"
						>
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.004-3.356M15 12a3 3 0 01-3 3m0-6a3 3 0 013 3m4.243 4.243L19 19m0 0l-3.758-3.758m3.758 3.758L15 15m4 4l-4-4"
							/>
						</svg>
					</button>
					<div *ngIf="_formPassword.hasError('mismatch') && _formPassword.get('c_password')?.touched" class="text-red-500 text-sm mt-1">
						Las contraseñas no coinciden
					</div>
				</div>

				<button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-md mb-4">
					Resetear Password
				</button>
			</form>
		</div>
	</div>
</section>
